<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stream-curator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary">
        <div class="brand">SC</div>
        <button class="nav-item is-active" id="nav-push" type="button" aria-label="推送" title="推送">
          <span class="nav-icon">⌂</span>
        </button>
        <button class="nav-item" id="nav-hot" type="button" aria-label="热门" title="热门">
          <span class="nav-icon">◎</span>
        </button>
        <button class="nav-item" id="nav-search" type="button" aria-label="搜索" title="搜索">
          <span class="nav-icon">⌕</span>
        </button>
        <button class="nav-item nav-foot" type="button" aria-label="设置" title="设置" disabled>
          <span class="nav-icon">⚙</span>
        </button>
      </aside>

      <main class="workspace">
        <section class="push-view" id="push-view">
          <header class="toolbar">
            <div class="toolbar-copy">
              <p id="status-line">正在准备推送...</p>
              <p id="meta-line"></p>
            </div>
            <button class="refresh-button" id="refresh-button" type="button" aria-label="刷新" title="刷新">↻</button>
          </header>

          <section class="card-grid" id="card-grid" aria-label="卡片流"></section>

          <section class="search-view is-hidden" id="search-view" aria-label="搜索结果">
            <form class="search-form" id="search-form">
              <input
                class="search-input"
                id="search-input"
                type="search"
                name="query"
                placeholder="输入关键词"
                autocomplete="off"
              />
              <button class="action-button action-primary search-submit" id="search-submit" type="submit">
                搜索
              </button>
            </form>

            <section class="search-review is-hidden" id="search-review" aria-label="AI整理结果">
              <div class="search-review-top">
                <p class="search-review-kicker" id="search-review-kicker">AI整理中</p>
                <p class="search-review-meta" id="search-review-meta"></p>
              </div>
              <p class="search-review-summary" id="search-review-summary"></p>
              <div class="search-review-groups" id="search-review-groups"></div>
            </section>

            <div class="search-results" id="search-results"></div>
          </section>

          <section class="detail-panel" aria-label="详情">
            <div class="detail-empty" id="detail-empty">等待内容加载...</div>

            <div class="detail-content is-hidden" id="detail-content">
              <div class="detail-header">
                <div class="detail-headline">
                  <div class="detail-meta-row">
                    <span class="pill" id="detail-source"></span>
                    <span class="pill pill-strong" id="detail-level"></span>
                    <span class="detail-author" id="detail-author"></span>
                  </div>
                  <h2 id="detail-title"></h2>
                </div>

                <div class="detail-actions">
                  <button class="action-button action-primary" id="reader-button" type="button">应用内阅读</button>
                  <button class="action-button" id="open-button" type="button">打开原站</button>
                  <button class="action-button" id="copy-button" type="button">复制链接</button>
                </div>
              </div>

              <div class="label-row" id="detail-labels"></div>
              <p class="detail-summary" id="detail-summary"></p>
              <p class="detail-reason" id="detail-reason"></p>
              <div class="detail-sections" id="detail-sections"></div>
            </div>
          </section>
        </section>

        <section class="reader-view is-hidden" id="reader-view" aria-label="阅读页">
          <header class="reader-toolbar">
            <div class="reader-title-block">
              <button class="back-button" id="reader-back-button" type="button">← 返回</button>
              <div class="reader-heading">
                <div class="detail-meta-row">
                  <span class="pill" id="reader-source"></span>
                  <span class="pill pill-strong" id="reader-level"></span>
                  <span class="detail-author" id="reader-author"></span>
                </div>
                <h1 id="reader-title"></h1>
              </div>
            </div>

            <div class="detail-actions">
              <button class="action-button action-primary" id="reader-open-button" type="button">打开原站</button>
              <button class="action-button" id="reader-copy-button" type="button">复制链接</button>
            </div>
          </header>

          <section class="reader-overview">
            <article class="reader-ai-card">
              <p class="reader-kicker">AI 摘要</p>
              <p class="reader-ai-copy" id="reader-summary"></p>
            </article>
            <article class="reader-ai-card">
              <p class="reader-kicker">推荐理由</p>
              <p class="reader-ai-copy" id="reader-reason"></p>
              <div class="label-row" id="reader-labels"></div>
            </article>
          </section>

          <section class="reader-body" id="reader-body"></section>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
